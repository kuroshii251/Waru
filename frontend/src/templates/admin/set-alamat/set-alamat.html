<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alamat Pengiriman - Waru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <style>
      /* Mencegah pergeseran kasat mata (layout shift) saat reload */
      .preload * {
        -webkit-transition: none !important;
        -moz-transition: none !important;
        -ms-transition: none !important;
        -o-transition: none !important;
        transition: none !important;
      }
    </style>
</head>

<body class="bg-black text-white preload">

  <aside
    class="fixed h-screen z-40 transition-all duration-300 will-change-transform overflow-x-hidden w-16 border-white/10 border-r top-0 bottom-0 left-0 backdrop-blur-xl bg-black/50"
    id="sidebar">
    <div class="flex flex-col h-full">
      
      <div class="flex border-white/10 border-b p-4 items-center justify-between h-16 shrink-0">
        <a href="/" id="brandLink" class="flex items-center gap-1.5 group shrink-0" style="display: none;">
          <div class="flex items-center h-9 w-10">
            <img src="../../../public/logo.png" alt="Waru Logo" class="h-full w-full object-contain object-left" />
          </div>
          <h1 class="text-xl font-bold tracking-wider text-red-600 dark:text-red-500 transition-colors group-hover:opacity-80 font-sans leading-none">
            Waru
          </h1>
        </a>
        
        <div class="inline-flex items-center gap-2 ml-auto">
          <button id="toggleCollapse" class="hidden md:inline-flex items-center justify-center h-8 w-8 rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 transition-colors" aria-label="Toggle sidebar" aria-pressed="true" title="Expand sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-icon="left" class="w-4 h-4 text-white/70" style="display: none;"><path d="m11 17-5-5 5-5"></path><path d="m18 17-5-5 5-5"></path></svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-icon="right" class="w-4 h-4 text-white/70"><path d="m6 17 5-5-5-5"></path><path d="m13 17 5-5-5-5"></path></svg>
          </button>
          <button id="closeSidebar" class="md:hidden inline-flex items-center justify-center h-8 w-8 rounded-lg border border-white/10 bg-white/5">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-white/70"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
          </button>
        </div>
      </div>

   <nav class="flex-1 overflow-y-auto pt-4 px-3 space-y-1">
        <div class="px-2 mb-2" data-collapse-hide style="display: none;">
          <p class="text-[11px] uppercase tracking-wider text-white/40 font-medium font-geist">Main</p>
        </div>
        
        <div class="space-y-1">
          <a href="/dashboard-admin" class="group flex items-center gap-3 hover:text-white hover:bg-white/5 hover:border-white/10 text-sm text-white/80 border-transparent border rounded-lg p-2.5" title="Overview">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4.5 h-4.5 shrink-0"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>
            <span class="font-geist navigation-text" style="display: none;">Dashboard</span>
          </a>
          
          <a href="/list-product" class="group flex items-center gap-3 hover:text-white hover:bg-white/5 hover:border-white/10 text-sm text-white/80 border-transparent border rounded-lg p-2.5" title="Product">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4.5 h-4.5 shrink-0"><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path><rect width="20" height="14" x="2" y="6" rx="2"></rect></svg>
            <span class="font-geist navigation-text" style="display: none;">Produk</span>
          </a>
          
          <a href="/manage-orders" class="group flex items-center gap-3 rounded-lg p-2.5 text-sm font-medium text-white/90 bg-white/10 border border-white/10" title="Manage Order">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4.5 h-4.5 text-emerald-400 shrink-0"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path><path d="M14 2v4a2 2 0 0 0 2 2h4"></path><path d="M10 9H8"></path><path d="M16 13H8"></path><path d="M16 17H8"></path></svg>
            <span class="font-geist navigation-text" style="display: none;">Kelola Pesanan</span>
          </a>
          
          <a href="/alamat" class="group flex items-center gap-3 rounded-lg p-2.5 text-sm text-white/80 hover:text-white hover:bg-white/5 border border-transparent hover:border-white/10" title="Address">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4.5 h-4.5 shrink-0"><path d="M3 3v16a2 2 0 0 0 2 2h16"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path></svg>
            <span class="font-geist navigation-text" style="display: none;">Kelola Alamat</span>
          </a>

          <a href="/list-users" class="group flex items-center gap-3 rounded-lg p-2.5 text-sm text-white/80 hover:text-white hover:bg-white/5 border border-transparent hover:border-white/10" title="Users">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4.5 h-4.5 shrink-0"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><path d="M16 3.128a4 4 0 0 1 0 7.744"></path><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><circle cx="9" cy="7" r="4"></circle></svg>
            <span class="font-geist navigation-text" style="display: none;">Pengguna</span>
          </a>
        </div>
      </nav>

      <div class="p-4 border-t border-white/10" data-collapse-hide style="display: none;">
        <div class="rounded-xl border border-emerald-500/30 bg-emerald-500/10 p-2.5">
          <a href="/logout" class="block text-center">
            <p class="text-xs font-medium text-emerald-200 font-geist">Logout</p>
          </a>
        </div>
      </div>
    </div>
  </aside>

  <main id="content" class="p-6 transition-all duration-300" style="margin-left: 64px;">
    <div class="max-w-4xl mx-auto px-2 sm:px-4 py-6 text-zinc-100 antialiased">

      <div class="flex items-center gap-4 mb-8">
          <div class="p-3 bg-red-500/10 text-red-500 border border-red-500/20 rounded-2xl shadow-inner">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-6 h-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
              </svg>
          </div>
          <div>
              <h1 class="text-2xl font-bold tracking-tight">Alamat Pengiriman</h1>
              <p class="text-sm text-zinc-400 mt-0.5">Kelola titik lokasi pengantaran pesanan Warung Waru Anda.</p>
          </div>
      </div>

      <div class="bg-zinc-900/60 border border-white/10 rounded-2xl p-6 shadow-xl backdrop-blur-md mb-10">
          <form id="addressForm" class="space-y-4">
              <input type="hidden" id="edit_id">

              <div>
                  <label for="recipient_address" class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2.5">
                      Alamat Lengkap Tujuan
                  </label>
                  <textarea
                      id="recipient_address"
                      name="recipient_address"
                      class="w-full p-4 bg-black/40 border border-white/10 rounded-xl text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500/30 transition-all duration-200 resize-none leading-relaxed text-sm"
                      placeholder="Tuliskan nama jalan, nomor rumah, nomor gedung, RT/RW, kelurahan, kecamatan, dan kota..."
                      rows="3"
                  ></textarea>
              </div>

              <div class="flex justify-end">
                  <button class="w-full sm:w-auto px-6 bg-red-600 hover:bg-red-500 active:scale-[0.98] text-white py-3 rounded-xl font-semibold text-sm tracking-wide transition-all duration-200 shadow-lg shadow-red-600/10 flex items-center justify-center gap-2">
                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                      </svg>
                      Simpan Alamat
                  </button>
              </div>
          </form>
      </div>

      <div>
          <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-3">
              <h2 class="text-base font-semibold tracking-tight text-zinc-200">Daftar Alamat Tersimpan</h2>
              <span class="text-xs bg-white/5 border border-white/10 text-zinc-400 px-3 py-1 rounded-full font-medium" id="address-count">
                  0 Alamat
              </span>
          </div>
          
          <div class="overflow-x-auto bg-zinc-900/40 border border-white/10 rounded-2xl shadow-2xl">
              <table class="w-full text-left border-collapse">
                  <thead>
                      <tr class="border-b border-white/10 bg-white/[0.02] text-xs font-semibold uppercase tracking-wider text-zinc-400">
                          <th class="py-4 px-5 w-16 text-center">No.</th>
                          <th class="py-4 px-5">Detail Lokasi</th>
                          <th class="py-4 px-5 w-44 text-center">Tindakan</th>
                      </tr>
                  </thead>
                  <tbody id="list" class="divide-y divide-white/5 text-sm">
                      </tbody>
              </table>
          </div>
      </div>

    </div>
  </main>

  <script>
    // --- SIDEBAR HANDLER (ANTI-FLICKER) ---
    (function () {
      const sidebar = document.getElementById('sidebar');
      const content = document.getElementById('content');
      const collapseBtn = document.getElementById('toggleCollapse');
      const iconLeft = collapseBtn ? collapseBtn.querySelector('[data-icon="left"]') : null;
      const iconRight = collapseBtn ? collapseBtn.querySelector('[data-icon="right"]') : null;
      const brandLink = document.getElementById('brandLink');
      const textElements = sidebar.querySelectorAll('.navigation-text');
      const hideElements = sidebar.querySelectorAll('[data-collapse-hide]');

      function setSidebarState(collapsed) {
        if (collapsed) {
          sidebar.style.width = '64px';
          sidebar.classList.add('collapsed');
          content.style.marginLeft = '64px';
          
          hideElements.forEach(el => el.style.display = 'none');
          textElements.forEach(el => el.style.display = 'none');
          if (brandLink) brandLink.style.display = 'none';
          
          if (iconLeft && iconRight) { iconLeft.style.display = 'none'; iconRight.style.display = 'inline-block'; }
          if (collapseBtn) { collapseBtn.setAttribute('aria-pressed', 'true'); collapseBtn.title = 'Expand sidebar'; }
          localStorage.setItem('sidebarCollapsed', '1');
        } else {
          sidebar.style.width = '288px';
          sidebar.classList.remove('collapsed');
          content.style.marginLeft = '288px';
          
          hideElements.forEach(el => el.style.display = '');
          textElements.forEach(el => el.style.display = '');
          if (brandLink) brandLink.style.display = 'flex';
          
          if (iconLeft && iconRight) { iconLeft.style.display = 'inline-block'; iconRight.style.display = 'none'; }
          if (collapseBtn) { collapseBtn.setAttribute('aria-pressed', 'false'); collapseBtn.title = 'Collapse sidebar'; }
          localStorage.setItem('sidebarCollapsed', '0');
        }
      }

      const storedState = localStorage.getItem('sidebarCollapsed');
      const initialCollapsed = storedState ? storedState === '1' : true; 
      
      setSidebarState(initialCollapsed);

      window.addEventListener('DOMContentLoaded', () => {
        document.body.classList.remove('preload');
      });

      if (collapseBtn) {
        collapseBtn.addEventListener('click', () => {
          const isCurrentCollapsed = sidebar.classList.contains('collapsed');
          setSidebarState(!isCurrentCollapsed);
        });
      }
    })();

    // --- DATA HANDLING (CRUD) ---
    async function loadAddress() {
        const res = await fetch("/api/alamat");
        const data = await res.json();

        const el = document.getElementById("list");
        const countEl = document.getElementById("address-count");
        
        countEl.textContent = `${data.length} Alamat`;
        el.innerHTML = "";

        if (!data.length) {
            el.innerHTML = `
                <tr>
                    <td colspan="3" class="py-12 text-center text-zinc-500 italic text-sm">
                        Belum ada alamat pengiriman yang terdaftar.
                    </td>
                </tr>`;
            return;
        }

        data.forEach((a, index) => {
            el.innerHTML += `
                <tr class="hover:bg-white/[0.02] transition-colors duration-150">
                    <td class="py-4 px-5 text-center font-medium text-zinc-500">
                        ${index + 1}
                    </td>
                    <td class="py-4 px-5 text-zinc-300 leading-relaxed whitespace-pre-line text-sm">
                        ${a.recipient_address}
                    </td>
                    <td class="py-4 px-5 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editAddress(${a.id}, \`${a.recipient_address}\`)"
                                class="px-3 py-1.5 text-xs font-semibold text-amber-400 bg-amber-500/5 hover:bg-amber-500/10 border border-amber-500/20 rounded-xl transition-all duration-150">
                                Edit
                            </button>
                            <button onclick="deleteAddress(${a.id})"
                                class="px-3 py-1.5 text-xs font-semibold text-red-400 bg-red-500/5 hover:bg-red-500/10 border border-red-500/20 rounded-xl transition-all duration-150">
                                Hapus
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    document.getElementById("addressForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const id = document.getElementById("edit_id").value;
        const recipient_address = document.getElementById("recipient_address").value.trim();
        if (!recipient_address) return alert("Alamat tidak boleh kosong");

        if (id) {
            const res = await fetch(`/api/alamat/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ recipient_address })
            });
            if (!res.ok) return alert("Gagal memperbarui alamat");
        } else {
            const formData = new FormData();
            formData.append("recipient_address", recipient_address);
            const res = await fetch("/api/alamat", {
                method: "POST",
                body: formData
            });
            if (!res.ok) return alert("Gagal menambahkan alamat");
        }

        document.getElementById("edit_id").value = "";
        document.getElementById("recipient_address").value = "";
        loadAddress();
    });

    function editAddress(id, address) {
        document.getElementById("edit_id").value = id;
        document.getElementById("recipient_address").value = address;
        document.getElementById("recipient_address").focus();
    }

    async function deleteAddress(id) {
        if (!confirm("Apakah Anda yakin ingin menghapus alamat ini?")) return;
        
        await fetch(`/api/alamat/${id}`, {
            method: "DELETE"
        });

        loadAddress();
    }

    loadAddress();
  </script>
</body>
</html>

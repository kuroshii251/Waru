  <script class="">
    (function () {
          const sidebar = document.getElementById('sidebar');
          const collapseBtn = sidebar.querySelector('#toggleCollapse');
          const iconLeft = collapseBtn ? collapseBtn.querySelector('[data-icon="left"]') : null;
          const iconRight = collapseBtn ? collapseBtn.querySelector('[data-icon="right"]') : null;
          const brandBar = sidebar.querySelector('.border-b');
          const brandLink = brandBar ? brandBar.querySelector('a') : null;

          // Select the main content wrapper reliably (next sibling of sidebar)
          const selectMain = () => sidebar.nextElementSibling;

          function setCollapsed(collapsed) {
            try {
              if (collapsed) {
                sidebar.style.width = '64px';
                sidebar.classList.add('collapsed');
                // Hide collapsible labels/sections
                sidebar.querySelectorAll('[data-collapse-hide]').forEach(el => { el.style.display = 'none'; });
                sidebar.querySelectorAll('nav a span.font-geist').forEach(el => { el.style.display = 'none'; });
                // Ensure the toggle icon is always visible
                if (brandLink) brandLink.style.display = 'none';
                if (brandBar) { brandBar.style.paddingLeft = '8px'; brandBar.style.paddingRight = '8px'; }
                // Update main content padding so it fills space
                const main = selectMain();
if (main) main.style.marginLeft = collapsed ? '64px' : '';                // Toggle button icon and aria state
                if (iconLeft && iconRight) { iconLeft.style.display = 'none'; iconRight.style.display = ''; }
                if (collapseBtn) { collapseBtn.setAttribute('aria-pressed', 'true'); collapseBtn.title = 'Expand sidebar'; }
                localStorage.setItem('sidebarCollapsed', '1');
              } else {
                sidebar.style.width = '';
                sidebar.classList.remove('collapsed');
                // Show labels/sections
                sidebar.querySelectorAll('[data-collapse-hide]').forEach(el => { el.style.display = ''; });
                sidebar.querySelectorAll('nav a span.font-geist').forEach(el => { el.style.display = ''; });
                if (brandLink) brandLink.style.display = '';
                if (brandBar) { brandBar.style.paddingLeft = ''; brandBar.style.paddingRight = ''; }
                // Restore main content padding
                const main = selectMain();
                if (main) main.classList.add('md:pl-72');
                // Toggle button icon and aria state
                if (iconLeft && iconRight) { iconLeft.style.display = ''; iconRight.style.display = 'none'; }
                if (collapseBtn) { collapseBtn.setAttribute('aria-pressed', 'false'); collapseBtn.title = 'Collapse sidebar'; }
                localStorage.setItem('sidebarCollapsed', '0');
              }
            } catch (e) {}
          }

          // Initialize state from storage or fallback to DOM state
          const stored = localStorage.getItem('sidebarCollapsed');
          const initialCollapsed = stored ? stored === '1' : sidebar.classList.contains('collapsed');
          setCollapsed(initialCollapsed);

          if (collapseBtn) {
            collapseBtn.addEventListener('click', () => {
              const isCollapsed = sidebar.classList.contains('collapsed');
              setCollapsed(!isCollapsed);
            });
          }
        })();
  </script>

<main id="content" class="p-6" style="margin-left: 288px; transition: margin-left 0.3s;">
     <form id="productForm" class="max-w-2xl bg-zinc-900/40 border border-zinc-900 rounded-2xl p-6 space-y-5 backdrop-blur-sm">
  
  <div class="border-b border-zinc-800 pb-3">
    <h3 class="text-sm font-bold text-white">Update Produk</h3>
    <p class="text-[11px] text-zinc-500 mt-0.5">Isi detail barang kelontong dengan teliti untuk memperbarui etalase.</p>
  </div>

  <div class="space-y-1.5">
    <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400">Nama Produk / Barang</label>
    <input 
      type="text" 
      name="product_name" 
    value="{{ product.product_name }}"
      required
      placeholder="Contoh: Mi Instan Indomie Goreng"
      class="w-full bg-zinc-950 border border-zinc-800 text-xs text-white px-3.5 py-2.5 rounded-xl placeholder:text-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
    >
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div class="space-y-1.5">
      <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400">Harga Eceran (Rp)</label>
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-xs font-semibold text-zinc-600">Rp</span>
        <input 
          type="number" 
          name="price" 
        value="{{ product.price }}"
          required
          placeholder="0"
          class="w-full bg-zinc-950 border border-zinc-800 text-xs text-white pl-9 pr-3.5 py-2.5 rounded-xl placeholder:text-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
        >
      </div>
    </div>

    <div class="space-y-1.5">
      <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400">Jumlah Stok Awal</label>
      <input 
        type="number" 
        name="quantity" 
        value="{{ product.quantity }}"
        required
        placeholder="Contoh: 40"
        class="w-full bg-zinc-950 border border-zinc-800 text-xs text-white px-3.5 py-2.5 rounded-xl placeholder:text-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
      >
    </div>
  </div>

  <div class="space-y-1.5">
    <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400">Deskripsi / Keterangan Singkat</label>
    <<textarea 
  name="description"
  required
  rows="3"
  placeholder="Keterangan tambahan (misal: isi kemasan, varian rasa, atau takaran)"
  class="w-full bg-zinc-950 border border-zinc-800 text-xs text-white px-3.5 py-2.5 rounded-xl placeholder:text-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all resize-none"
>{{ product.description }}</textarea>
  </div>
<img
    src="/uploads/{{ product.product_picture }}"
    class="w-32 h-32 object-cover mb-2"
>
  <div class="space-y-1.5">
    <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400">Foto Produk</label>
    <label class="group relative flex flex-col items-center justify-center w-full h-32 border border-dashed border-zinc-800 hover:border-zinc-700 bg-zinc-950/50 rounded-xl cursor-pointer transition-all p-4">
      <div class="flex flex-col items-center justify-center space-y-1.5 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-upload-cloud text-zinc-500 group-hover:text-zinc-400 transition-colors"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>
        <p class="text-xs font-semibold text-zinc-300">Klik untuk unggah foto</p>
        <p class="text-[10px] text-zinc-500">PNG, JPG, atau WEBP (Maks. 2MB)</p>
      </div>
      <input 
        type="file" 
        name="product_picture" 
        accept="image/*" 
        required 
        class="hidden"
      >
    </label>
  </div>

  <div class="pt-2 flex justify-end">
    <button 
      type="submit"
      class="w-full sm:w-auto h-9 px-5 inline-flex items-center justify-center gap-1.5 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-zinc-950 text-xs font-bold active:scale-[0.98] transition-all shadow-lg shadow-emerald-500/10 cursor-pointer"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      Simpan Barang
    </button>
  </div>

</form>
</main>
<script>
const productId = {{ product.id }};

document.getElementById("productForm")
.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);

    const response = await fetch(`/api/products/${productId}`, {
        method: "PUT",
        body: formData
    });

    const result = await response.json();

    if(response.ok){
        alert("Produk berhasil diperbarui");
    }
});
</script>
</body>
